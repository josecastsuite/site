<div style="max-width: 500px; margin: 30px auto; font-family: Arial, sans-serif; padding: 25px; border: 1px solid #ddd; border-radius: 10px;">
  
  <h3 style="margin-top:0; color:#333;">JoseCast Otomatik Lisans Teslimi</h3>
  <p style="font-size:13px; color:#666;">Paddle işlem numaranızı (txn_... veya inv_...) girerek lisansınızı anında alın.</p>
  
  <form id="licenseForm">
    <input type="email" id="lcEmail" placeholder="Paddle'daki e-posta adresiniz" required style="width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
    <input type="text" id="lcTxn" placeholder="İşlem No (örn: txn_01h8...)" required style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
    <button type="submit" id="btnLicense" style="width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">Lisansımı Doğrula ve Ver</button>
  </form>
  <p id="licenseResponse" style="margin-top: 15px; font-size: 14px; font-weight: bold;"></p>

  <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

  <h4 style="margin-top:0; color:#333;">Lisansımı Unuttum</h4>
  <form id="forgetForm">
    <input type="email" id="forgetEmail" placeholder="E-posta adresinizi girin" required style="width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
    <button type="submit" id="btnForget" style="width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Lisansları Tekrar Gönder</button>
  </form>
  <p id="forgetResponse" style="margin-top: 15px; font-size: 14px; font-weight: bold;"></p>
</div>

<script>
  const RENDER_URL = "https://exopicy-bottle.onrender.com"; 

  // LİSANS VER
  document.getElementById('licenseForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('lcEmail').value.trim();
    const txn = document.getElementById('lcTxn').value.trim();
    const resp = document.getElementById('licenseResponse');
    const btn = document.getElementById('btnLicense');
    
    resp.innerText = "Paddle doğrulanıyor, lütfen bekleyin...";
    resp.style.color = "#333";
    btn.disabled = true;

    fetch(`${RENDER_URL}/lisans-ver`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, islem_no: txn })
    })
    .then(res => res.json())
    .then(data => {
      if(data.ok) {
        resp.innerHTML = `✅ Başarılı! Lisans anahtarınız: <b>${data.key}</b><br>${data.email} adresine gönderildi.`;
        resp.style.color = "green";
      } else {
        resp.innerText = `❌ Hata: ${data.hata}`;
        resp.style.color = "red";
      }
    })
    .catch(err => { resp.innerText = "Sistem bağlantı hatası!"; resp.style.color = "red"; })
    .finally(() => btn.disabled = false);
  });

  // LİSANS HATIRLAT
  document.getElementById('forgetForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('forgetEmail').value;
    const resp = document.getElementById('forgetResponse');
    const btn = document.getElementById('btnForget');
    
    resp.innerText = "Sistem taranıyor...";
    resp.style.color = "#333";
    btn.disabled = true;

    fetch(`${RENDER_URL}/remember-license`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    })
    .then(res => res.json())
    .then(data => {
      if(data.status === "success") {
          resp.innerText = "✅ Lisanslarınız e-posta adresinize gönderildi.";
          resp.style.color = "green";
      } else if(data.status === "not_found") {
          resp.innerText = "❌ Bu e-posta ile kayıtlı lisans bulunamadı.";
          resp.style.color = "red";
      } else {
          resp.innerText = "❌ Bir hata oluştu.";
          resp.style.color = "red";
      }
    })
    .catch(err => { resp.innerText = "Sistem bağlantı hatası!"; resp.style.color = "red"; })
    .finally(() => btn.disabled = false);
  });
</script>
