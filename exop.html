<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Josecast Suite - Lisans Talep Testi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #004494;
        }
        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }
        #resultBox {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
            text-align: center;
            font-size: 14px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .key-display {
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            background: #fff;
            padding: 8px;
            margin-top: 10px;
            border: 1px dashed #155724;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Lisansını Al</h2>
    <form id="licenseForm">
        <label for="email">Satın Alırken Kullanılan E-Posta</label>
        <input type="email" id="email" placeholder="ornek@email.com" required>

        <label for="islem_no">İşlem (Fatura) Numarası</label>
        <input type="text" id="islem_no" placeholder="txn_..." required>

        <button type="submit" id="submitBtn">Lisansımı Getir</button>
    </form>

    <div id="resultBox"></div>
</div>

<script>
    document.getElementById('licenseForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Sayfanın yenilenmesini engelle
        
        const email = document.getElementById('email').value.trim();
        const islem_no = document.getElementById('islem_no').value.trim();
        const btn = document.getElementById('submitBtn');
        const resultBox = document.getElementById('resultBox');

        // Butonu kilitliyoruz ki adam 10 kere tıklayıp spama düşmesin
        btn.disabled = true;
        btn.innerText = "Sorgulanıyor, Lütfen Bekleyin...";
        resultBox.style.display = "none";
        resultBox.className = "";
        resultBox.innerHTML = "";

        // BURAYA KENDİ RENDER ADRESİNİ YAZACAKSIN
        const RENDER_URL = "https://exopicy-bottle.onrender.com";

        try {
            const response = await fetch(RENDER_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    email: email, 
                    islem_no: islem_no 
                })
            });

            const data = await response.json();

            if (data.ok) {
                // Her şey başarılıysa yeşil kutuyu göster
                resultBox.classList.add("success");
                resultBox.innerHTML = `
                    <strong>Lisansınız Onaylandı!</strong><br>
                    <div class="key-display">${data.key}</div><br>
                    <small>Bu anahtar aynı zamanda ${data.email} adresine mail olarak gönderildi.</small>
                `;
            } else {
                // Backend'den hata (ok=False) dönerse kırmızı kutuyu göster
                resultBox.classList.add("error");
                resultBox.innerHTML = `<strong>HATA:</strong> ${data.hata}`;
            }

        } catch (error) {
            // Sunucu çökmüş veya CORS hatası varsa burası çalışır
            console.error("Fetch Hatası:", error);
            resultBox.classList.add("error");
            resultBox.innerHTML = `<strong>BAĞLANTI HATASI:</strong> Sunucuya ulaşılamıyor. Lütfen bağlantınızı kontrol edin.`;
        } finally {
            // İşlem bitince butonu eski haline getir
            btn.disabled = false;
            btn.innerText = "Lisansımı Getir";
            resultBox.style.display = "block";
        }
    });
</script>

</body>
</html>
