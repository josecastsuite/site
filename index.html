<div style="max-width: 500px; margin: 30px auto; font-family: Arial, sans-serif; padding: 25px; border: 1px solid #ddd; border-radius: 10px;">
  
  <h3 style="margin-top:0; color:#333;">JoseCast Otomatik Lisans Teslimi</h3>
  <p style="font-size:13px; color:#666;">Paddle faturanızı (PDF) aşağıdaki alana yükleyerek lisansınızı anında üretebilirsiniz.</p>
  
  <form id="uploadForm" enctype="multipart/form-data">
    <input type="file" id="dekontFile" name="dekont" accept=".pdf" required style="margin-bottom: 15px; display: block; width: 100%;">
    <button type="submit" id="btnUpload" style="width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">Lisansımı Doğrula ve Ver</button>
  </form>
  <p id="uploadResponse" style="margin-top: 15px; font-size: 14px; font-weight: bold;"></p>

  <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

  <h4 style="margin-top:0; color:#333;">Lisansımı Unuttum</h4>
  <form id="forgetForm">
    <input type="email" id="forgetEmail" placeholder="E-posta adresinizi girin" required style="width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
    <button type="submit" id="btnForget" style="width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Lisansları Tekrar Gönder</button>
  </form>
  <p id="forgetResponse" style="margin-top: 15px; font-size: 14px; font-weight: bold;"></p>
</div>

<script>
  // BURAYA RENDER'IN SANA VERDİĞİ LİNK GELECEK
  const RENDER_URL = "https://exopicy-bottle.onrender.com"; 

  document.getElementById('uploadForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData();
    formData.append('dekont', document.getElementById('dekontFile').files[0]);
    const resp = document.getElementById('uploadResponse');
    resp.innerText = "Faturanız doğrulanıyor, lütfen bekleyin...";
    resp.style.color = "#333";

    fetch(`${RENDER_URL}/lisans-ver`, { method: 'POST', body: formData })
    .then(res => res.json())
    .then(data => {
      if(data.ok) {
        resp.innerHTML = `✅ Başarılı! Lisans anahtarınız <b>${data.key}</b> üretime girdi ve <b>${data.email}</b> adresine gönderildi.`;
        resp.style.color = "green";
      } else {
        resp.innerText = `❌ Hata: ${data.hata}`;
        resp.style.color = "red";
      }
    }).catch(err => { resp.innerText = "Sistem bağlantı hatası!"; resp.style.color = "red"; });
  });

  document.getElementById('forgetForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('forgetEmail').value;
    const resp = document.getElementById('forgetResponse');
    resp.innerText = "Sistem taranıyor...";
    resp.style.color = "#333";

    fetch(`${RENDER_URL}/remember-license`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    })
    .then(res => res.json())
    .then(data => {
      if(data.status === "success") {
          resp.innerText = data.message;
          resp.style.color = "green";
      } else {
          resp.innerText = data.message || "Bir hata oluştu.";
          resp.style.color = "red";
      }
    }).catch(err => { resp.innerText = "Sistem bağlantı hatası!"; resp.style.color = "red"; });
  });
</script>
